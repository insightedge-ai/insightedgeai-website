name: Deploy InsightEdge

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    env:
      APP_DIR: /opt/insightedge
      TMP_DEPLOY_DIR: /tmp/insightedge-deploy

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Create generated env files inside workspace
        shell: bash
        run: |
          set -euo pipefail

          GEN_DIR="deploy/insightedge/.generated"
          mkdir -p "${GEN_DIR}"

          cat > "${GEN_DIR}/.env.website" <<'EOW'
          WEBSITE_PORT=${{ secrets.INSIGHTEDGE_WEBSITE_PORT }}
          NEXT_PUBLIC_SITE_URL=${{ secrets.INSIGHTEDGE_NEXT_PUBLIC_SITE_URL }}
          NEXT_PUBLIC_API_BASE_URL=${{ secrets.INSIGHTEDGE_NEXT_PUBLIC_API_BASE_URL }}
          NEXT_PUBLIC_RAG_API_URL=${{ secrets.INSIGHTEDGE_NEXT_PUBLIC_RAG_API_URL }}
          EOW

          cat > "${GEN_DIR}/.env.rag" <<'EOR'
          RAG_PORT=${{ secrets.INSIGHTEDGE_RAG_PORT }}
          OPENAI_API_KEY=${{ secrets.INSIGHTEDGE_OPENAI_API_KEY }}
          OPENAI_MODEL=${{ secrets.INSIGHTEDGE_OPENAI_MODEL }}
          PINECONE_API_KEY=${{ secrets.INSIGHTEDGE_PINECONE_API_KEY }}
          PINECONE_INDEX=${{ secrets.INSIGHTEDGE_PINECONE_INDEX }}
          PINECONE_ENVIRONMENT=${{ secrets.INSIGHTEDGE_PINECONE_ENVIRONMENT }}
          EOR

          cat > "${GEN_DIR}/.deploy.env" <<'EOD'
          GHCR_USERNAME=${{ secrets.GHCR_USERNAME }}
          GHCR_TOKEN=${{ secrets.GHCR_TOKEN }}
          WEBSITE_IMAGE=ghcr.io/insightedge-ai/insightedgeai-website:latest
          RAG_IMAGE=ghcr.io/insightedge-ai/website-chatbot-rag:latest
          COMPOSE_PROJECT_NAME=insightedge
          EOD

      - name: Verify generated env files exist and are non-empty
        shell: bash
        run: |
          set -euo pipefail

          for f in \
            deploy/insightedge/.generated/.env.website \
            deploy/insightedge/.generated/.env.rag \
            deploy/insightedge/.generated/.deploy.env
          do
            test -f "$f" || { echo "Missing file: $f"; exit 1; }
            test -s "$f" || { echo "Empty file: $f"; exit 1; }
          done

          echo "Generated files:"
          ls -lah deploy/insightedge/.generated/

      - name: Prepare remote staging directory
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.LINODE_HOST }}
          username: ${{ secrets.LINODE_USER }}
          key: ${{ secrets.LINODE_SSH_KEY }}
          script: |
            set -euo pipefail
            rm -rf /tmp/insightedge-deploy
            mkdir -p /tmp/insightedge-deploy

      - name: Upload deploy assets to remote staging dir
        uses: appleboy/scp-action@v1.0.0
        with:
          host: ${{ secrets.LINODE_HOST }}
          username: ${{ secrets.LINODE_USERNAME }}
          key: ${{ secrets.LINODE_SSH_KEY }}
          port: ${{ secrets.LINODE_PORT }}
          source: "deploy/insightedge/docker-compose.yml,deploy/insightedge/website.env.allowlist,deploy/insightedge/rag.env.allowlist,deploy/insightedge/deploy.allowlist,deploy/insightedge/healthcheck.sh,deploy/insightedge/remote_deploy_insightedge.sh"
          target: "${{ env.TMP_DEPLOY_DIR }}"
          strip_components: 2

      - name: Upload generated env files to remote staging dir
        uses: appleboy/scp-action@v1.0.0
        with:
          host: ${{ secrets.LINODE_HOST }}
          username: ${{ secrets.LINODE_USERNAME }}
          key: ${{ secrets.LINODE_SSH_KEY }}
          port: ${{ secrets.LINODE_PORT }}
          source: "deploy/insightedge/.generated/.env.website,deploy/insightedge/.generated/.env.rag,deploy/insightedge/.generated/.deploy.env"
          target: "${{ env.TMP_DEPLOY_DIR }}"
          strip_components: 3

      - name: Run remote deploy
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.LINODE_HOST }}
          username: ${{ secrets.LINODE_USERNAME }}
          key: ${{ secrets.LINODE_SSH_KEY }}
          port: ${{ secrets.LINODE_PORT }}
          script: |
            set -euo pipefail

            chmod 600 /tmp/insightedge-deploy/.env.website
            chmod 600 /tmp/insightedge-deploy/.env.rag
            chmod 600 /tmp/insightedge-deploy/.deploy.env
            chmod 755 /tmp/insightedge-deploy/healthcheck.sh
            chmod 755 /tmp/insightedge-deploy/remote_deploy_insightedge.sh

            cd /tmp/insightedge-deploy
            ./remote_deploy_insightedge.sh

      - name: Post-deploy quick verification
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.LINODE_HOST }}
          username: ${{ secrets.LINODE_USERNAME }}
          key: ${{ secrets.LINODE_SSH_KEY }}
          port: ${{ secrets.LINODE_PORT }}
          script: |
            set -euo pipefail

            echo "== /opt/insightedge =="
            ls -lah /opt/insightedge

            echo
            echo "== docker compose ps =="
            docker compose -f /opt/insightedge/docker-compose.yml --env-file /opt/insightedge/.env.website ps

            echo
            echo "== local website health =="
            docker exec insightedgeai-website sh -lc 'wget -qO- http://localhost:3000/ | head -c 200 || true'

            echo
            echo "== local rag health =="
            docker exec insightedgeai-rag-backend sh -lc 'wget -qO- http://localhost:8010/health || true'
